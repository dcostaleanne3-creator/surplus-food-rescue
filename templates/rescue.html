{% extends "base.html" %}

{% block title %}Rescue Food | Surplus Food Rescue{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-16 px-4 sm:px-6 lg:px-8 bg-gray-50 relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-emerald-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
    <div class="absolute top-24 -right-24 w-96 h-96 bg-teal-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>

    <div class="max-w-xl w-full relative z-10">
        <div class="bg-white rounded-[2rem] shadow-2xl border border-gray-100 overflow-hidden transform transition-all">
            <!-- Header -->
            <div class="emerald-gradient px-8 py-10 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/20 text-white mb-6 backdrop-blur-md shadow-inner">
                    <i class="fa-solid fa-hand-holding-heart text-3xl drop-shadow-md"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-white outfit-font tracking-tight drop-shadow-sm">Log Surplus Food</h2>
                <p class="mt-3 text-emerald-50 text-base font-medium opacity-90">Enter details to dispatch recovery teams.</p>
            </div>
            
            <!-- Form -->
            <form id="rescueForm" class="p-8 sm:p-10 space-y-7">
                <div class="space-y-1">
                    <label class="block text-sm font-bold text-gray-700 flex items-center gap-2">
                        <i class="fa-solid fa-bowl-food text-emerald-500"></i> Type of Food
                    </label>
                    <select name="Type of Food" class="w-full px-4 py-3.5 border-2 border-gray-100 rounded-xl bg-gray-50 focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none text-gray-700 font-medium">
                        <option>Vegetables</option>
                        <option>Meat</option>
                        <option>Fruits</option>
                        <option>Cooked Meals</option>
                    </select>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-7">
                    <div class="space-y-1">
                        <label class="block text-sm font-bold text-gray-700 flex items-center gap-2">
                            <i class="fa-solid fa-users text-emerald-500"></i> Total Guests
                        </label>
                        <input type="number" min="1" name="Number of Guests" placeholder="e.g. 150" class="w-full px-4 py-3.5 border-2 border-gray-100 rounded-xl bg-gray-50 focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none font-medium text-gray-700" required>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-sm font-bold text-gray-700 flex items-center gap-2">
                            <i class="fa-solid fa-weight-scale text-emerald-500"></i> Quantity (kg)
                        </label>
                        <input type="number" min="1" name="Quantity of Food" placeholder="e.g. 45" class="w-full px-4 py-3.5 border-2 border-gray-100 rounded-xl bg-gray-50 focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none font-medium text-gray-700" required>
                    </div>
                </div>
                
                <div class="space-y-1">
                    <label class="block text-sm font-bold text-gray-700 flex items-center gap-2">
                        <i class="fa-regular fa-calendar-check text-emerald-500"></i> Event Type
                    </label>
                    <select name="Event Type" class="w-full px-4 py-3.5 border-2 border-gray-100 rounded-xl bg-gray-50 focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none text-gray-700 font-medium">
                        <option>Wedding</option>
                        <option>Corporate</option>
                        <option>Social Gathering</option>
                        <option>Birthday</option>
                    </select>
                </div>
                
                <button type="submit" id="submitBtn" class="w-full emerald-gradient text-white font-bold py-4 rounded-xl hover:shadow-lg hover:shadow-emerald-500/30 transition-all transform active:scale-[0.98] mt-4 flex justify-center items-center gap-2 text-lg">
                    <span>Analyze & Notify NGOs</span>
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </button>
            </form>

            <!-- Results Section -->
            <div id="result" class="hidden border-t-2 border-dashed border-gray-100 bg-gray-50 p-8 sm:p-10 transition-all">
                <div class="flex items-center space-x-4 mb-5 pb-5 border-b border-gray-200">
                    <div id="icon" class="text-4xl flex-shrink-0"></div>
                    <div>
                        <p class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-1">AI Prediction</p>
                        <p id="predictionText" class="font-extrabold text-2xl outfit-font text-gray-900"></p>
                    </div>
                </div>
                <div id="ngoSection" class="text-sm text-gray-600 leading-relaxed"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('rescueForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const originalBtnHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Processing...';
        btn.disabled = true;
        btn.classList.add('opacity-75');

        const formData = new FormData(e.target);
        const data = {
            "Type of Food": formData.get("Type of Food"),
            "Number of Guests": parseInt(formData.get("Number of Guests")),
            "Event Type": formData.get("Event Type"),
            "Quantity of Food": parseInt(formData.get("Quantity of Food"))
        };
        
        const resultDiv = document.getElementById('result');
        const predText = document.getElementById('predictionText');
        const ngoSection = document.getElementById('ngoSection');
        const icon = document.getElementById('icon');

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();

            resultDiv.classList.remove('hidden');
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
            
            if(result.status === "High Waste") {
                resultDiv.className = "border-t-2 border-red-100 bg-red-50 p-8 sm:p-10 transition-all animation-fade-in";
                icon.innerHTML = "<span class='text-red-500 drop-shadow-md'>🚨</span>";
                predText.className = "font-extrabold text-2xl outfit-font text-red-700";
                predText.innerText = `${result.predicted_waste} kg High Waste`;
                
                let html = `<div class="bg-white p-5 rounded-xl border border-red-100 shadow-sm mt-2">
                            <p class="font-bold mb-3 text-gray-800 flex items-center gap-2"><i class="fa-solid fa-truck-fast text-red-500"></i> NGOs Alerted Successfully:</p>
                            <ul class="space-y-3">`;
                result.ngos.forEach(ngo => {
                    html += `
                        <li class="flex items-start gap-3 text-sm">
                            <div class="mt-0.5 text-red-500"><i class="fa-solid fa-location-dot"></i></div>
                            <div>
                                <strong class="text-gray-900 block">${ngo.name}</strong>
                                <span class="text-gray-500">${ngo.phone} &bull; ${ngo.area}</span>
                            </div>
                        </li>`;
                });
                html += `</ul></div>
                         <div class="mt-4 inline-flex items-center gap-2 bg-red-100 text-red-800 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide">
                            <i class="fa-solid fa-bell"></i> ${result.action}
                         </div>`;
                ngoSection.innerHTML = html;
            } else {
                resultDiv.className = "border-t-2 border-emerald-100 bg-emerald-50 p-8 sm:p-10 transition-all animation-fade-in";
                icon.innerHTML = "<span class='text-emerald-500 drop-shadow-md'>✅</span>";
                predText.className = "font-extrabold text-2xl outfit-font text-emerald-700";
                predText.innerText = `${result.predicted_waste} kg Low Waste`;
                
                ngoSection.innerHTML = `
                    <div class="bg-white p-5 rounded-xl border border-emerald-100 shadow-sm mt-2 flex items-start gap-4">
                        <div class="text-emerald-500 text-2xl mt-1"><i class="fa-solid fa-seedling"></i></div>
                        <div>
                            <p class="font-bold text-gray-800 mb-1">Manageable Levels</p>
                            <p class="text-gray-600 text-sm leading-relaxed">Food levels are within manageable limits. We recommend local composting or utilizing it within your immediate community.</p>
                        </div>
                    </div>`;
            }
        } catch (err) {
            alert("Server connection failed. Check if app.py is running.");
        } finally {
            btn.innerHTML = originalBtnHtml;
            btn.disabled = false;
            btn.classList.remove('opacity-75');
        }
    };
</script>
<style>
    .animation-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
