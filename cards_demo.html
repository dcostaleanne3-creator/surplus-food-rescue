<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Animated Card Selection (Tailwind)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* 
         * Reusable animated spring transition class
         * Provides the spring-like motion (not just linear ease)
         */
        .spring-motion {
            transition-property: all;
            transition-duration: 400ms;
            transition-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Pulse + Fading for the indicator dot */
        @keyframes pulse-fade {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        .animate-pulse-fade {
            animation: pulse-fade 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-6 text-slate-200 antialiased selection:bg-indigo-500/30 overflow-x-hidden">

    <div class="max-w-5xl w-full">
        <div class="mb-12 text-center">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400 mb-4 tracking-tight">Choose Your Impact Level</h1>
            <p class="text-slate-400 text-lg">Experience the fluid, GPU-accelerated interaction</p>
        </div>

        <!-- 
          Card Selection Container 
          Uses grid and gap for layout. No layout shift on animations.
        -->
        <fieldset class="grid grid-cols-1 sm:grid-cols-3 gap-6 relative z-10">
            <legend class="sr-only">Impact Level Options</legend>

            <!-- Card 1 -->
            <label class="group relative cursor-pointer outline-none block h-full w-full" tabindex="0">
                <!-- Hidden accessible radio/checkbox (peer) -->
                <input type="radio" name="impact" class="peer sr-only">
                
                <!-- Main Card Background & Container -->
                <div class="relative h-full w-full overflow-hidden rounded-2xl bg-gradient-to-br from-slate-900 to-slate-800 border-2 border-slate-800/80 p-6 shadow-lg spring-motion will-change-transform
                            group-hover:-translate-y-1.5 group-hover:scale-[1.02] group-hover:border-indigo-500/50 group-hover:shadow-[0_10px_40px_-10px_rgba(99,102,241,0.3)]
                            group-active:scale-[0.98] group-active:translate-y-0
                            peer-checked:-translate-y-1.5 peer-checked:scale-[1.02] peer-checked:border-indigo-500 peer-checked:bg-gradient-to-br peer-checked:from-indigo-900/30 peer-checked:to-slate-900 peer-checked:shadow-[0_0_30px_rgba(99,102,241,0.4)]
                            peer-focus-visible:ring-2 peer-focus-visible:ring-indigo-400 peer-focus-visible:ring-offset-4 peer-focus-visible:ring-offset-slate-950">
                    
                    <!-- Top section (Icon + Indicator) -->
                    <div class="flex justify-between items-start mb-8 relative z-10">
                        <!-- Icon Base -->
                        <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-slate-800 text-slate-400 spring-motion
                                    group-hover:bg-indigo-500/20 group-hover:text-indigo-400 group-hover:shadow-[0_0_15px_rgba(99,102,241,0.3)]
                                    peer-checked:bg-indigo-500/30 peer-checked:text-indigo-300 peer-checked:shadow-[0_0_20px_rgba(99,102,241,0.5)]">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        
                        <!-- Indicator Dot Area -->
                        <div class="relative flex h-4 w-4 items-center justify-center">
                            <!-- Background Pulse (Hidden by default, shown on Check) -->
                            <span class="absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-0 spring-motion peer-checked:opacity-50 peer-checked:animate-ping"></span>
                            <!-- Foreground Dot -->
                            <span class="relative inline-flex h-2.5 w-2.5 rounded-full bg-slate-700 spring-motion group-hover:bg-indigo-400/50 group-hover:shadow-[0_0_8px_rgba(99,102,241,0.8)] peer-checked:bg-indigo-400 peer-checked:shadow-[0_0_10px_rgba(99,102,241,1)] peer-checked:animate-pulse-fade"></span>
                        </div>
                    </div>
                    
                    <!-- Text Content -->
                    <div class="relative z-10 spring-motion group-hover:text-indigo-50 peer-checked:text-white">
                        <h3 class="text-xl font-bold mb-2">Starter</h3>
                        <p class="text-sm leading-relaxed text-slate-400 spring-motion group-hover:text-slate-300 peer-checked:text-indigo-200/80">Support local drives with basic recovery operations & tracking.</p>
                    </div>
                </div>

                <!-- Expanding Progress/Status Bar at bottom -->
                <div class="absolute bottom-0 left-0 h-1 w-full overflow-hidden rounded-b-2xl opacity-0 group-hover:opacity-100 peer-checked:opacity-100 spring-motion z-20 pointer-events-none">
                    <div class="h-full bg-indigo-500 w-0 spring-motion group-hover:w-full peer-checked:w-full shadow-[0_-2px_10px_rgba(99,102,241,0.8)]"></div>
                </div>
            </label>

            <!-- Card 2 -->
            <label class="group relative cursor-pointer outline-none block h-full w-full" tabindex="0">
                <input type="radio" name="impact" class="peer sr-only" checked>
                <div class="relative h-full w-full overflow-hidden rounded-2xl bg-gradient-to-br from-slate-900 to-slate-800 border-2 border-slate-800/80 p-6 shadow-lg spring-motion will-change-transform
                            group-hover:-translate-y-1.5 group-hover:scale-[1.02] group-hover:border-indigo-500/50 group-hover:shadow-[0_10px_40px_-10px_rgba(99,102,241,0.3)]
                            group-active:scale-[0.98] group-active:translate-y-0
                            peer-checked:-translate-y-1.5 peer-checked:scale-[1.02] peer-checked:border-indigo-500 peer-checked:bg-gradient-to-br peer-checked:from-indigo-900/30 peer-checked:to-slate-900 peer-checked:shadow-[0_0_30px_rgba(99,102,241,0.4)]
                            peer-focus-visible:ring-2 peer-focus-visible:ring-indigo-400 peer-focus-visible:ring-offset-4 peer-focus-visible:ring-offset-slate-950">
                    <div class="flex justify-between items-start mb-8 relative z-10">
                        <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-slate-800 text-slate-400 spring-motion
                                    group-hover:bg-indigo-500/20 group-hover:text-indigo-400 group-hover:shadow-[0_0_15px_rgba(99,102,241,0.3)]
                                    peer-checked:bg-indigo-500/30 peer-checked:text-indigo-300 peer-checked:shadow-[0_0_20px_rgba(99,102,241,0.5)]">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </div>
                        <div class="relative flex h-4 w-4 items-center justify-center">
                            <span class="absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-0 spring-motion peer-checked:opacity-50 peer-checked:animate-ping"></span>
                            <span class="relative inline-flex h-2.5 w-2.5 rounded-full bg-slate-700 spring-motion group-hover:bg-indigo-400/50 group-hover:shadow-[0_0_8px_rgba(99,102,241,0.8)] peer-checked:bg-indigo-400 peer-checked:shadow-[0_0_10px_rgba(99,102,241,1)] peer-checked:animate-pulse-fade"></span>
                        </div>
                    </div>
                    <div class="relative z-10 spring-motion group-hover:text-indigo-50 peer-checked:text-white">
                        <h3 class="text-xl font-bold mb-2">Professional</h3>
                        <p class="text-sm leading-relaxed text-slate-400 spring-motion group-hover:text-slate-300 peer-checked:text-indigo-200/80">Standard option. Scale our app to support city-wide operations seamlessly.</p>
                    </div>
                </div>
                <div class="absolute bottom-0 left-0 h-1 w-full overflow-hidden rounded-b-2xl opacity-0 group-hover:opacity-100 peer-checked:opacity-100 spring-motion z-20 pointer-events-none">
                    <div class="h-full bg-indigo-500 w-0 spring-motion group-hover:w-full peer-checked:w-full shadow-[0_-2px_10px_rgba(99,102,241,0.8)]"></div>
                </div>
            </label>

             <!-- Card 3 -->
             <label class="group relative cursor-pointer outline-none block h-full w-full" tabindex="0">
                <input type="radio" name="impact" class="peer sr-only">
                <div class="relative h-full w-full overflow-hidden rounded-2xl bg-gradient-to-br from-slate-900 to-slate-800 border-2 border-slate-800/80 p-6 shadow-lg spring-motion will-change-transform
                            group-hover:-translate-y-1.5 group-hover:scale-[1.02] group-hover:border-indigo-500/50 group-hover:shadow-[0_10px_40px_-10px_rgba(99,102,241,0.3)]
                            group-active:scale-[0.98] group-active:translate-y-0
                            peer-checked:-translate-y-1.5 peer-checked:scale-[1.02] peer-checked:border-indigo-500 peer-checked:bg-gradient-to-br peer-checked:from-indigo-900/30 peer-checked:to-slate-900 peer-checked:shadow-[0_0_30px_rgba(99,102,241,0.4)]
                            peer-focus-visible:ring-2 peer-focus-visible:ring-indigo-400 peer-focus-visible:ring-offset-4 peer-focus-visible:ring-offset-slate-950">
                    <div class="flex justify-between items-start mb-8 relative z-10">
                        <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-slate-800 text-slate-400 spring-motion
                                    group-hover:bg-indigo-500/20 group-hover:text-indigo-400 group-hover:shadow-[0_0_15px_rgba(99,102,241,0.3)]
                                    peer-checked:bg-indigo-500/30 peer-checked:text-indigo-300 peer-checked:shadow-[0_0_20px_rgba(99,102,241,0.5)]">
                            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                        </div>
                        <div class="relative flex h-4 w-4 items-center justify-center">
                            <span class="absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-0 spring-motion peer-checked:opacity-50 peer-checked:animate-ping"></span>
                            <span class="relative inline-flex h-2.5 w-2.5 rounded-full bg-slate-700 spring-motion group-hover:bg-indigo-400/50 group-hover:shadow-[0_0_8px_rgba(99,102,241,0.8)] peer-checked:bg-indigo-400 peer-checked:shadow-[0_0_10px_rgba(99,102,241,1)] peer-checked:animate-pulse-fade"></span>
                        </div>
                    </div>
                    <div class="relative z-10 spring-motion group-hover:text-indigo-50 peer-checked:text-white">
                        <h3 class="text-xl font-bold mb-2">Enterprise</h3>
                        <p class="text-sm leading-relaxed text-slate-400 spring-motion group-hover:text-slate-300 peer-checked:text-indigo-200/80">Full administrative tracking and complete region-wide automation integration.</p>
                    </div>
                </div>
                <div class="absolute bottom-0 left-0 h-1 w-full overflow-hidden rounded-b-2xl opacity-0 group-hover:opacity-100 peer-checked:opacity-100 spring-motion z-20 pointer-events-none">
                    <div class="h-full bg-indigo-500 w-0 spring-motion group-hover:w-full peer-checked:w-full shadow-[0_-2px_10px_rgba(99,102,241,0.8)]"></div>
                </div>
            </label>

        </fieldset>
    </div>

    <!-- Keyboard Access Script -->
    <script>
        // Make labels clickable via Enter/Space key when focused
        const interactiveLabels = document.querySelectorAll('label[tabindex="0"]');
        interactiveLabels.forEach(label => {
            label.addEventListener('keydown', (e) => {
                if(e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    label.click();
                }
            });
        });
    </script>
</body>
</html>
